version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cyber_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_backend
    restart: always
    env_file: .env
    volumes:
      - ./backend:/app
      - file_storage:/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal_network
    env_file: .env

  redis:
    image: redis:7-alpine
    container_name: cyber_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: ./backend
    container_name: cyber_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backend:/app
      - file_storage:/app/storage
    networks:
      - internal_network

  nginx:
    image: nginx:alpine
    container_name: cyber_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal_network
  # === Тунель Ngrok ===
  ngrok:
    image: ngrok/ngrok:latest
    container_name: cyber_ngrok
    restart: always
    ports:
      - "4040:4040"
    env_file: .env
    command: http nginx:80 --log=stdout
    depends_on:
      - nginx
    networks:
      - internal_network
networks:
  internal_network:
    driver: bridge

volumes:
  postgres_data:
  file_storage:
  redis_data:
